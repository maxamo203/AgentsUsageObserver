name: Build & Release installer

# Se dispara al empujar un tag tipo v0.1.0
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # necesario para crear el Release y subir el .exe

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish (self-contained, multi-file)
        run: dotnet publish AgentUsageObserver/AgentUsageObserver.csproj -c Release -r win-x64

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: installer_output/*.exe
          generate_release_notes: true
